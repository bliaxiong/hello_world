replicaCount: 1

image:
  repository: ghcr.io/bliaxiong/hello_world
  pullPolicy: IfNotPresent
  # CI pipeline overwrites this field on every merge to main
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 9000

ingress:
  enabled: false
  className: ""
  host: hello-world.local
  tls: []

resources:
  requests:
    cpu: "50m"
    memory: "32Mi"
  limits:
    cpu: "200m"
    memory: "64Mi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /healthz
    port: 9000
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: 9000
  initialDelaySeconds: 3
  periodSeconds: 5

env: []
# - name: EXAMPLE
#   value: "value"

podAnnotations: {}
podSecurityContext: {}
securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534   # nobody

nodeSelector: {}
tolerations: []
affinity: {}